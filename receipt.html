<!DOCTYPE html>
<html>
<head>
  <title>Your Receipt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: monospace; padding: 30px;">

  <h2>Order Confirmed 💫</h2>

<div id="orderText" style="margin-top: 20px;"></div>
  
  <hr>

  <p>Order #: UNV-<span id="orderNumber"></span></p>
  <p>Status: Unfolding in your favor</p>
  <p>Estimated delivery: Divine timing</p>

  <br>
  <br>

  <p><strong><small>Screenshot this as your receipt</small></strong></p>

<script>
  const params = new URLSearchParams(window.location.search);
const order = params.get("order") || localStorage.getItem("order");
  const orderContainer = document.getElementById("orderText");

  if (order && orderContainer) {
    const items = order
      .split("\n")
      .filter(item => item.trim() !== "");

    let html = "<strong>Items:</strong><br><br>";

    items.forEach(item => {
      html += item + "<br>";
    });

    orderContainer.innerHTML = html;
  }

  const orderNumberEl = document.getElementById("orderNumber");
  if (orderNumberEl) {
    orderNumberEl.innerText = Math.floor(Math.random() * 100000);
  }
</script>

</body>
</html>
